<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Fórmula 1 — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            formula: { red: "#dc2626", dark: "#111827", light: "#f3f4f6" }
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="min-h-screen bg-gray-900">
  <main class="flex min-h-screen items-center justify-center px-4">
    <section class="w-full max-w-md rounded-xl bg-white p-8 shadow-xl">
      <h1 class="mb-2 text-center text-3xl font-bold text-gray-900">Sistema Fórmula 1</h1>
      <p class="mb-6 text-center text-gray-500">Laboratório de Bases de Dados</p>

      <form id="login-form" class="space-y-4">
        <div>
          <label for="login" class="block text-sm font-semibold text-gray-700">Login</label>
          <input id="login" name="login" type="text" required autocomplete="username"
            class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:border-red-500 focus:outline-none focus:ring-2 focus:ring-red-200">
        </div>

        <div>
          <label for="password" class="block text-sm font-semibold text-gray-700">Senha</label>
          <input id="password" name="password" type="password" required autocomplete="current-password"
            class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:border-red-500 focus:outline-none focus:ring-2 focus:ring-red-200">
        </div>

        <button type="submit"
          class="w-full rounded-lg bg-red-600 px-4 py-2 font-semibold text-white hover:bg-red-700 disabled:cursor-not-allowed disabled:opacity-60">
          Entrar
        </button>
      </form>

      <div id="login-error" class="mt-4" aria-live="polite"></div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
